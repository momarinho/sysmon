name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      - name: Smoke tests
        run: |
          ./target/release/sysmon-rs &
          SERVER_PID=$!

          trap "kill $SERVER_PID" EXIT

          for _ in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8080/health > /dev/null; then
              break
            fi
            sleep 1
          done

          curl -sf http://127.0.0.1:8080/health
          curl -sf http://127.0.0.1:8080/metrics
          curl -sf http://127.0.0.1:8080/metrics/prometheus | grep -q "sysmon_cpu_usage_percent"
        shell: bash

  frontend:
    name: frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libgtk-3-dev liblzma-dev ninja-build pkg-config

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Analyze code
        working-directory: flutter_app
        run: flutter analyze

      - name: Run Flutter tests
        working-directory: flutter_app
        run: flutter test

      - name: Build Linux release
        working-directory: flutter_app
        run: flutter build linux --release
